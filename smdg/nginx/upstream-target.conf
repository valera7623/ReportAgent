map $request_uri $smdg_upstream {
    default http://smdg:8000;
}

# ReportAgent: resolve at request time so nginx starts when containers are stopped.
map $request_uri $reportagent_api_upstream {
    default http://reportagent_fastapi:8000;
}

map $request_uri $reportagent_grafana_upstream {
    default http://reportagent_grafana:3000;
}
