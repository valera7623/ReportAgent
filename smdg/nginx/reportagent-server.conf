# ReportAgent edge proxy — append to SMDG nginx-https.conf
# API/Grafana on host ports (ReportAgent standalone: TRAEFIK_ENABLED=false)
# Install: ./scripts/install-reportagent-nginx-block.sh

# --- ReportAgent edge proxy (managed) ---

server {
    listen 80;
    server_name reportagent.fileguardian.info;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name reportagent.fileguardian.info;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 30M;

    # SPA: /#/login → /app#/login (hash is client-only; redirect at /)
    location = / {
        default_type text/html;
        return 200 '<!DOCTYPE html><html><head><meta charset="utf-8"><script>location.replace("/app/"+(location.hash||"#/dashboard"));</script></head><body></body></html>';
    }

    location / {
        proxy_pass http://172.17.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 90s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
}

server {
    listen 443 ssl;
    server_name grafana.reportagent.fileguardian.info;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    location / {
        proxy_pass http://172.17.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
