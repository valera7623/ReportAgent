global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: reportagent

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: fastapi
    metrics_path: /metrics
    static_configs:
      - targets:
          - reportagent_fastapi:8000
        labels:
          service: fastapi

  - job_name: node_exporter
    static_configs:
      - targets:
          - reportagent_node_exporter:9100
        labels:
          service: node_exporter

  - job_name: cadvisor
    static_configs:
      - targets:
          - reportagent_cadvisor:8080
        labels:
          service: cadvisor

  - job_name: alertmanager
    static_configs:
      - targets:
          - reportagent_alertmanager:9093

