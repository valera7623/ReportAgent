services:
  fastapi:
    build:
      context: ./app
      dockerfile: Dockerfile
    image: reportagent-app:latest
    container_name: reportagent_fastapi
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - LOG_DIR=/app/logs
      - PDF_DIR=/app/storage/pdfs
      - UPLOAD_DIR=/app/storage/uploads
      - DATABASE_URL=${DATABASE_URL:-sqlite:////app/app/data/users.db}
      - DEFAULT_PREFERRED_CHART_TYPE=${DEFAULT_PREFERRED_CHART_TYPE:-bar}
    volumes:
      - ./storage/pdfs:/app/storage/pdfs
      - ./storage/uploads:/app/storage/uploads
      - ./logs:/app/logs
      - ./app/data:/app/app/data
    networks:
      - traefik_network
      - internal
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_network"
      - "traefik.http.routers.reportagent.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.reportagent.entrypoints=websecure"
      - "traefik.http.routers.reportagent.tls=true"
      - "traefik.http.routers.reportagent.tls.certresolver=letsencrypt"
      - "traefik.http.services.reportagent.loadbalancer.server.port=8000"
      - "traefik.http.routers.reportagent-http.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.reportagent-http.entrypoints=web"
      - "traefik.http.routers.reportagent-http.middlewares=redirect-to-https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.permanent=true"

  celery_worker:
    build:
      context: ./app
      dockerfile: Dockerfile
    image: reportagent-app:latest
    container_name: reportagent_celery_worker
    restart: unless-stopped
    command: celery -A app.celery_app worker --loglevel=info
    env_file:
      - path: .env
        required: false
    environment:
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - LOG_DIR=/app/logs
      - PDF_DIR=/app/storage/pdfs
      - UPLOAD_DIR=/app/storage/uploads
      - DATABASE_URL=${DATABASE_URL:-sqlite:////app/app/data/users.db}
      - DEFAULT_PREFERRED_CHART_TYPE=${DEFAULT_PREFERRED_CHART_TYPE:-bar}
    volumes:
      - ./storage/pdfs:/app/storage/pdfs
      - ./storage/uploads:/app/storage/uploads
      - ./logs:/app/logs
      - ./app/data:/app/app/data
      - ./scripts/healthcheck_celery.sh:/usr/local/bin/healthcheck_celery.sh:ro
    networks:
      - internal
    depends_on:
      redis:
        condition: service_healthy
      fastapi:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bash", "/usr/local/bin/healthcheck_celery.sh"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 60s

  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    container_name: reportagent_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  traefik:
    profiles: ["traefik"]
    image: ${TRAEFIK_IMAGE:-traefik:v3.0}
    container_name: reportagent_traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - path: .env
        required: false
    environment:
      - LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL:-admin@example.com}
      - ACME_CA_SERVER=${ACME_CA_SERVER:-https://acme-v02.api.letsencrypt.org/directory}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - ./traefik/acme:/etc/traefik/acme
      - ./logs:/var/log/traefik
    networks:
      - traefik_network
      - internal
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  traefik_network:
    external: true
  internal:
    driver: bridge

volumes:
  redis-data:
    driver: local
