services:
  fastapi:
    build:
      context: ./app
      dockerfile: Dockerfile
    image: reportagent-app:latest
    container_name: reportagent_fastapi
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - LOG_DIR=/app/logs
      - PDF_DIR=/app/storage/pdfs
      - UPLOAD_DIR=/app/storage/uploads
      # Fixed SQLite path — do not inherit legacy postgresql DATABASE_URL from .env
      - DATABASE_URL=sqlite:////app/app/data/users.db
      - DEFAULT_PREFERRED_CHART_TYPE=${DEFAULT_PREFERRED_CHART_TYPE:-bar}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - WHISPER_MODEL=${WHISPER_MODEL:-whisper-1}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o-mini}
      - VOICE_ENABLED=${VOICE_ENABLED:-true}
      - MAX_AUDIO_SIZE_MB=${MAX_AUDIO_SIZE_MB:-25}
      - ALLOWED_AUDIO_FORMATS=${ALLOWED_AUDIO_FORMATS:-mp3,wav,m4a,ogg}
      - FORMATTED_DIR=/app/storage/formatted
      - DEFAULT_OUTPUT_FORMAT=${DEFAULT_OUTPUT_FORMAT:-pdf}
      - ALLOWED_OUTPUT_FORMATS=${ALLOWED_OUTPUT_FORMATS:-pdf,excel,pptx,notion,google_slides}
      - NOTION_INTEGRATION_TOKEN=${NOTION_INTEGRATION_TOKEN:-}
      - NOTION_DATABASE_ID=${NOTION_DATABASE_ID:-}
      - GOOGLE_SERVICE_ACCOUNT_JSON=${GOOGLE_SERVICE_ACCOUNT_JSON:-/app/secrets/google-sa.json}
      - GOOGLE_SLIDES_TEMPLATE_ID=${GOOGLE_SLIDES_TEMPLATE_ID:-}
      - SELF_HEALING_ENABLED=${SELF_HEALING_ENABLED:-true}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      - CHROMA_PERSIST_DIR=/app/chroma_data
      - SIMILARITY_THRESHOLD=${SIMILARITY_THRESHOLD:-0.75}
      - MAX_RETRY_ATTEMPTS=${MAX_RETRY_ATTEMPTS:-2}
      - ADMIN_API_KEY=${ADMIN_API_KEY:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - ALERTS_ENABLED=${ALERTS_ENABLED:-true}
      - DOMAIN=${DOMAIN:-localhost}
      - GRAFANA_DOMAIN=${GRAFANA_DOMAIN:-grafana.localhost}
    volumes:
      - ./storage/pdfs:/app/storage/pdfs
      - ./storage/formatted:/app/storage/formatted
      - ./storage/uploads:/app/storage/uploads
      - ./logs:/app/logs
      - ./app/data:/app/app/data
      - ./chroma_data:/app/chroma_data
      - ./secrets:/app/secrets:ro
    networks:
      - traefik_network
      - internal
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_network"
      - "traefik.http.routers.reportagent.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.reportagent.entrypoints=websecure"
      - "traefik.http.routers.reportagent.tls=true"
      - "traefik.http.routers.reportagent.tls.certresolver=letsencrypt"
      - "traefik.http.services.reportagent.loadbalancer.server.port=8000"
      - "traefik.http.routers.reportagent-http.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.reportagent-http.entrypoints=web"
      - "traefik.http.routers.reportagent-http.middlewares=redirect-to-https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.permanent=true"

  celery_worker:
    build:
      context: ./app
      dockerfile: Dockerfile
    image: reportagent-app:latest
    container_name: reportagent_celery_worker
    restart: unless-stopped
    command: celery -A app.celery_app worker --loglevel=info
    env_file:
      - path: .env
        required: false
    environment:
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - LOG_DIR=/app/logs
      - PDF_DIR=/app/storage/pdfs
      - UPLOAD_DIR=/app/storage/uploads
      - DATABASE_URL=sqlite:////app/app/data/users.db
      - DEFAULT_PREFERRED_CHART_TYPE=${DEFAULT_PREFERRED_CHART_TYPE:-bar}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - WHISPER_MODEL=${WHISPER_MODEL:-whisper-1}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o-mini}
      - VOICE_ENABLED=${VOICE_ENABLED:-true}
      - MAX_AUDIO_SIZE_MB=${MAX_AUDIO_SIZE_MB:-25}
      - ALLOWED_AUDIO_FORMATS=${ALLOWED_AUDIO_FORMATS:-mp3,wav,m4a,ogg}
      - FORMATTED_DIR=/app/storage/formatted
      - DEFAULT_OUTPUT_FORMAT=${DEFAULT_OUTPUT_FORMAT:-pdf}
      - ALLOWED_OUTPUT_FORMATS=${ALLOWED_OUTPUT_FORMATS:-pdf,excel,pptx,notion,google_slides}
      - NOTION_INTEGRATION_TOKEN=${NOTION_INTEGRATION_TOKEN:-}
      - NOTION_DATABASE_ID=${NOTION_DATABASE_ID:-}
      - GOOGLE_SERVICE_ACCOUNT_JSON=${GOOGLE_SERVICE_ACCOUNT_JSON:-/app/secrets/google-sa.json}
      - GOOGLE_SLIDES_TEMPLATE_ID=${GOOGLE_SLIDES_TEMPLATE_ID:-}
      - SELF_HEALING_ENABLED=${SELF_HEALING_ENABLED:-true}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      - CHROMA_PERSIST_DIR=/app/chroma_data
      - SIMILARITY_THRESHOLD=${SIMILARITY_THRESHOLD:-0.75}
      - MAX_RETRY_ATTEMPTS=${MAX_RETRY_ATTEMPTS:-2}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - ALERTS_ENABLED=${ALERTS_ENABLED:-true}
      - DOMAIN=${DOMAIN:-localhost}
      - GRAFANA_DOMAIN=${GRAFANA_DOMAIN:-grafana.localhost}
    volumes:
      - ./storage/pdfs:/app/storage/pdfs
      - ./storage/formatted:/app/storage/formatted
      - ./storage/uploads:/app/storage/uploads
      - ./logs:/app/logs
      - ./app/data:/app/app/data
      - ./chroma_data:/app/chroma_data
      - ./secrets:/app/secrets:ro
      - ./scripts/healthcheck_celery.sh:/usr/local/bin/healthcheck_celery.sh:ro
    networks:
      - internal
    depends_on:
      redis:
        condition: service_healthy
      fastapi:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bash", "/usr/local/bin/healthcheck_celery.sh"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 60s

  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    container_name: reportagent_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  celery_beat:
    build:
      context: ./app
      dockerfile: Dockerfile
    image: reportagent-app:latest
    container_name: reportagent_celery_beat
    restart: unless-stopped
    command: celery -A app.celery_app beat --loglevel=info
    env_file:
      - path: .env
        required: false
    environment:
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - DATABASE_URL=sqlite:////app/app/data/users.db
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o-mini}
      - SELF_HEALING_ENABLED=${SELF_HEALING_ENABLED:-true}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      - CHROMA_PERSIST_DIR=/app/chroma_data
      - SIMILARITY_THRESHOLD=${SIMILARITY_THRESHOLD:-0.75}
    volumes:
      - ./app/data:/app/app/data
      - ./chroma_data:/app/chroma_data
      - ./logs:/app/logs
      - ./scripts/healthcheck_celery_beat.sh:/usr/local/bin/healthcheck_celery_beat.sh:ro
    networks:
      - internal
    depends_on:
      redis:
        condition: service_healthy
      celery_worker:
        condition: service_started
    healthcheck:
      test: ["CMD", "bash", "/usr/local/bin/healthcheck_celery_beat.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  prometheus:
    image: prom/prometheus:latest
    container_name: reportagent_prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION_DAYS:-15}d"
      - "--web.enable-lifecycle"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    networks:
      - internal
    depends_on:
      fastapi:
        condition: service_healthy

  alertmanager:
    image: prom/alertmanager:latest
    container_name: reportagent_alertmanager
    restart: unless-stopped
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    networks:
      - internal
    depends_on:
      - prometheus

  grafana:
    image: grafana/grafana:latest
    container_name: reportagent_grafana
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-changeme}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=https://${GRAFANA_DOMAIN:-grafana.local}
      - GF_INSTALL_PLUGINS=
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - traefik_network
      - internal
    depends_on:
      - prometheus
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_network"
      - "traefik.http.routers.grafana.rule=Host(`${GRAFANA_DOMAIN:-grafana.local}`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls=true"
      - "traefik.http.routers.grafana.tls.certresolver=letsencrypt"
      - "traefik.http.routers.grafana.middlewares=grafana-auth"
      - "traefik.http.middlewares.grafana-auth.basicauth.users=${GRAFANA_BASICAUTH_USERS:-admin:$$apr1$$H6uskkWW$$IgXDT4vueRhTRrZF8Ccgt.}"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
      - "traefik.http.routers.grafana-http.rule=Host(`${GRAFANA_DOMAIN:-grafana.local}`)"
      - "traefik.http.routers.grafana-http.entrypoints=web"
      - "traefik.http.routers.grafana-http.middlewares=redirect-to-https"

  node_exporter:
    profiles: ["observability-host"]
    image: prom/node-exporter:latest
    container_name: reportagent_node_exporter
    restart: unless-stopped
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - internal

  cadvisor:
    profiles: ["observability-host"]
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: reportagent_cadvisor
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - internal

  traefik:
    profiles: ["traefik"]
    image: ${TRAEFIK_IMAGE:-traefik:v3.0}
    container_name: reportagent_traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - path: .env
        required: false
    environment:
      - LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL:-admin@example.com}
      - ACME_CA_SERVER=${ACME_CA_SERVER:-https://acme-v02.api.letsencrypt.org/directory}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - ./traefik/acme:/etc/traefik/acme
      - ./logs:/var/log/traefik
    networks:
      - traefik_network
      - internal
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  traefik_network:
    external: true
  internal:
    name: reportagent_internal
    driver: bridge

volumes:
  redis-data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  alertmanager_data:
    driver: local
