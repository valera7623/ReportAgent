# Nginx on the VPS host (when TRAEFIK_ENABLED=false in .env, without EXTERNAL_NGINX_NETWORK).
# ReportAgent FastAPI is exposed on 127.0.0.1:8000 via docker-compose.prod.host-nginx.yml.
#
# Install: sudo apt install nginx certbot python3-certbot-nginx
# Enable:  sudo ln -s /path/to/this/file /etc/nginx/sites-enabled/reportagent
#          sudo nginx -t && sudo systemctl reload nginx
# SSL:     sudo certbot --nginx -d your-domain.com
#
# All API endpoints except /health and /api/keys/generate require header:
#   X-API-Key: <your-key>
# Generate key: POST /api/keys/generate

server {
    listen 80;
    server_name your-domain.com;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 30M;
    }
}
