# Grafana behind existing Docker nginx (external nginx mode).
#
# Prerequisites:
#   1. DNS A-record: grafana.reportagent.fileguardian.info → VPS IP
#   2. ReportAgent .env:
#        TRAEFIK_ENABLED=false
#        EXTERNAL_NGINX_NETWORK=smdg_frontend   # your nginx network
#        DOMAIN=reportagent.fileguardian.info
#        GRAFANA_DOMAIN=grafana.reportagent.fileguardian.info
#        GRAFANA_ADMIN_PASSWORD=your_secure_password
#   3. ./deploy.sh  (grafana joins EXTERNAL_NGINX_NETWORK via docker-compose.prod.external-nginx.yml)
#   4. Add this server block to smdg nginx, reload container.
#
# Health check from nginx container:
#   docker exec smdg-nginx-1 curl -s http://reportagent_grafana:3000/api/health

server {
    listen 80;
    server_name grafana.reportagent.fileguardian.info;

    location / {
        proxy_pass http://reportagent_grafana:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# HTTPS: add listen 443 ssl; + certificate paths (same cert as ReportAgent or separate).
# Grafana login: GRAFANA_ADMIN_USER / GRAFANA_ADMIN_PASSWORD from ReportAgent .env
