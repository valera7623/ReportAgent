# Grafana behind existing Docker nginx (external nginx mode).
#
# Prerequisites:
#   1. DNS A-record: grafana.reportagent.fileguardian.info → 74.208.252.225
#   2. ReportAgent .env:
#        TRAEFIK_ENABLED=false
#        EXTERNAL_NGINX_NETWORK=smdg_frontend
#        DOMAIN=reportagent.fileguardian.info
#        GRAFANA_DOMAIN=grafana.reportagent.fileguardian.info
#        GRAFANA_ADMIN_PASSWORD=your_secure_password
#   3. ./deploy.sh
#   4. Add server blocks below to smdg nginx, reload.
#
# Health check from nginx container:
#   docker exec smdg-nginx-1 curl -s http://reportagent_grafana:3000/api/health

# --- HTTP (redirect to HTTPS) ---
server {
    listen 80;
    server_name grafana.reportagent.fileguardian.info;
    return 301 https://$host$request_uri;
}

# --- HTTPS ---
# ERROR "no alternative certificate subject name matches target hostname"
# means this server block is missing OR nginx uses a cert only for fileguardian.info.
# Fix: issue a dedicated cert for grafana.reportagent.fileguardian.info
#
# Certbot on VPS (if nginx mounts /etc/letsencrypt):
#   certbot certonly --webroot -w /var/www/certbot \
#     -d grafana.reportagent.fileguardian.info
#
# Or expand existing cert (if supported by your setup):
#   certbot certonly --nginx -d reportagent.fileguardian.info \
#     -d grafana.reportagent.fileguardian.info

server {
    listen 443 ssl http2;
    server_name grafana.reportagent.fileguardian.info;

    # Paths depend on your smdg nginx / certbot layout — adjust:
    ssl_certificate     /etc/letsencrypt/live/grafana.reportagent.fileguardian.info/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/grafana.reportagent.fileguardian.info/privkey.pem;

    # Use variable proxy_pass (see smdg/nginx/upstream-target.conf) so nginx
    # starts even when reportagent_grafana is stopped — requests get 502 instead.
    location / {
        proxy_pass $reportagent_grafana_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# Grafana login: GRAFANA_ADMIN_USER / GRAFANA_ADMIN_PASSWORD from ReportAgent .env
# Dashboard: https://grafana.reportagent.fileguardian.info/d/ReportAgent-Main/reportagent-main
