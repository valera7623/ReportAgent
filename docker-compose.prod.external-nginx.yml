# TRAEFIK_ENABLED=false + EXTERNAL_NGINX_NETWORK=smdg_default
# Connects FastAPI and Grafana to an existing Docker nginx stack (no ports 80/443 on ReportAgent).

services:
  fastapi:
    networks:
      - internal
      - external_nginx

  grafana:
    networks:
      - internal
      - external_nginx

networks:
  external_nginx:
    external: true
    name: ${EXTERNAL_NGINX_NETWORK}
