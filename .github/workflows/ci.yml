name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
  workflow_call:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: app/requirements.txt

      - name: Install dependencies
        run: pip install -r app/requirements.txt

      - name: Python syntax check
        run: python -m compileall app

      - name: Validate production compose
        run: docker compose -f docker-compose.prod.yml config

      - name: Validate dev compose
        run: docker compose -f docker-compose.dev.yml config

      - name: Shellcheck deploy scripts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck
          shellcheck deploy.sh deploy-dev.sh scripts/pull-images.sh scripts/github-deploy.sh scripts/healthcheck_celery.sh

  docker-build:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build app image
        run: docker compose -f docker-compose.prod.yml build fastapi
