name: Deploy to VPS

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      skip_ci:
        description: Skip CI checks (not recommended)
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: deploy-vps-production
  cancel-in-progress: false

jobs:
  ci:
    if: github.event_name != 'workflow_dispatch' || inputs.skip_ci != 'true'
    uses: ./.github/workflows/ci.yml

  deploy:
    runs-on: ubuntu-latest
    needs: ci
    if: always() && (needs.ci.result == 'success' || needs.ci.result == 'skipped')
    environment: production
    timeout-minutes: 45

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          DEPLOY_BRANCH: ${{ github.ref_name }}
          REPO_URL: https://github.com/${{ github.repository }}.git
          GITHUB_REPOSITORY: ${{ github.repository }}
          GIT_DEPLOY_TOKEN: ${{ secrets.GIT_DEPLOY_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: 40m
          envs: DEPLOY_PATH,DEPLOY_BRANCH,REPO_URL,GITHUB_REPOSITORY,GIT_DEPLOY_TOKEN
          script: |
            set -euo pipefail
            DEPLOY_PATH="${DEPLOY_PATH:-${HOME}/ReportAgent}"
            DEPLOY_BRANCH="${DEPLOY_BRANCH:-master}"

            if [[ ! -d "${DEPLOY_PATH}/.git" ]]; then
              echo "==> First deploy: cloning into ${DEPLOY_PATH}"
              if [[ "${DEPLOY_PATH}" == /opt/* ]] && [[ ! -w "$(dirname "${DEPLOY_PATH}")" ]]; then
                echo "ERROR: no write access to $(dirname "${DEPLOY_PATH}") without sudo." >&2
                echo "Either pre-create on VPS:" >&2
                echo "  sudo mkdir -p ${DEPLOY_PATH} && sudo chown \$(whoami):\$(whoami) ${DEPLOY_PATH}" >&2
                echo "Or set GitHub variable DEPLOY_PATH to e.g. \${HOME}/ReportAgent" >&2
                exit 1
              fi
              mkdir -p "${DEPLOY_PATH}"
              CLONE_URL="${REPO_URL}"
              if [[ -n "${GIT_DEPLOY_TOKEN:-}" ]]; then
                CLONE_URL="https://x-access-token:${GIT_DEPLOY_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
              fi
              git clone --branch "${DEPLOY_BRANCH}" "${CLONE_URL}" "${DEPLOY_PATH}"
            fi

            export DEPLOY_PATH DEPLOY_BRANCH REPO_URL GITHUB_REPOSITORY GIT_DEPLOY_TOKEN
            bash "${DEPLOY_PATH}/scripts/github-deploy.sh"

      - name: External health check (optional)
        if: vars.DOMAIN != '' && vars.SKIP_EXTERNAL_HEALTH_CHECK != 'true'
        continue-on-error: true
        run: |
          DOMAIN="$(echo "${DOMAIN}" | tr '[:upper:]' '[:lower:]')"
          echo "Checking public URL for domain: ${DOMAIN}"
          sleep 15
          ok=0
          for url in "http://${DOMAIN}/health" "https://${DOMAIN}/health"; do
            for i in 1 2 3; do
              if curl --fail --silent --max-time 20 --retry 0 "$url"; then
                echo ""
                echo "Public health OK: $url"
                ok=1
                break 2
              fi
              echo "Attempt $i failed for $url"
              sleep 10
            done
          done
          if [[ "$ok" -eq 0 ]]; then
            echo "::warning::Public URL not reachable yet (DNS/nginx/SSL may be pending)."
            echo "Deploy on VPS may still be OK — configure nginx for ${DOMAIN} (see docs/nginx-docker-existing.example.conf)."
            echo "To silence this step: GitHub Variable SKIP_EXTERNAL_HEALTH_CHECK=true"
            exit 1
          fi
        env:
          DOMAIN: ${{ vars.DOMAIN }}
