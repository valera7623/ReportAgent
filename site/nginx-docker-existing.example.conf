# Add to your existing nginx project (e.g. smdg) — proxy ReportAgent subdomain.
# FastAPI must be on the same Docker network (EXTERNAL_NGINX_NETWORK in ReportAgent .env).
#
# 1. Find network name:
#    docker inspect smdg-nginx-1 --format '{{range $k,$v := .NetworkSettings.Networks}}{{$k}}{{"\n"}}{{end}}'
# 2. In ReportAgent .env:
#    TRAEFIK_ENABLED=false
#    EXTERNAL_NGINX_NETWORK=smdg_default
#    DOMAIN=reportagent.fileguardian.info
# 3. Redeploy ReportAgent: ./deploy.sh
# 4. Add this server block to nginx, reload nginx container.
#
# Note: root domain (fileguardian.info) may serve another app (e.g. SMDG).
# Use a dedicated subdomain for ReportAgent.

server {
    listen 80;
    server_name reportagent.fileguardian.info;

    location / {
        proxy_pass http://reportagent_fastapi:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 30M;
    }
}

# HTTPS: add listen 443 ssl; + cert paths, or use certbot in the smdg stack.
# Health check (from nginx container):
#   docker exec smdg-nginx-1 curl -s http://reportagent_fastapi:8000/health
# Public check:
#   curl https://reportagent.fileguardian.info/health
#
# Grafana (optional): docs/nginx-grafana.example.conf
#   DNS: grafana.reportagent.fileguardian.info → proxy reportagent_grafana:3000
