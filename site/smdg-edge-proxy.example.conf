# Thin edge proxy in smdg-nginx (TLS only). ReportAgent is NOT on smdg Docker network.
# Append to ~/SMDG/nginx-https.conf, then: docker exec smdg-nginx-1 nginx -t && docker exec smdg-nginx-1 nginx -s reload
#
# ReportAgent must publish host ports (TRAEFIK_ENABLED=false, standalone mode):
#   API     → 172.17.0.1:8000
#   Grafana → 172.17.0.1:3000

server {
    listen 80;
    server_name reportagent.fileguardian.info;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name reportagent.fileguardian.info;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # SPA lives under /app/ — hash routes like #/login need /app in the path
    location = / {
        default_type text/html;
        return 200 '<!DOCTYPE html><html><head><meta charset="utf-8"><script>location.replace("/app/"+(location.hash||"#/dashboard"));</script></head><body></body></html>';
    }

    location / {
        proxy_pass http://172.17.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 30M;
    }
}

server {
    listen 443 ssl;
    server_name grafana.reportagent.fileguardian.info;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://172.17.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
